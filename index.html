<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Punk Exchange</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation; /* Отключает зум при клике на смартфонах */
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--neon-blue);
        }

        #balance { font-size: 32px; font-weight: bold; color: var(--neon-blue); }
        #status { font-size: 12px; color: var(--neon-pink); letter-spacing: 2px; }

        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .active { display: flex; }

        /* КЛИКЕР */
        .cyber-card {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #1a1a1e 0%, #000 100%);
            border: 3px solid var(--neon-blue);
            border-radius: 50%; /* Сделаем круглой для удобства */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transition: transform 0.05s;
            margin-top: 30px;
        }

        .cyber-card:active { transform: scale(0.92); }

        /* БИРЖА */
        .price-display {
            font-size: 24px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border: 1px solid var(--neon-pink);
            width: 80%;
            text-align: center;
        }

        .trade-controls { display: flex; gap: 10px; width: 100%; max-width: 300px; }
        .btn {
            flex: 1; padding: 15px; border: none; border-radius: 8px;
            font-weight: bold; color: white; cursor: pointer;
        }
        .buy { background: #00ff88; }
        .sell { background: #ff0055; }

        /* НАВИГАЦИЯ */
        .nav-bar {
            display: flex;
            background: var(--card-bg);
            border-top: 1px solid var(--neon-blue);
            padding: 15px 0;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }

        .active-nav { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }

        .plus-one {
            position: absolute;
            color: var(--neon-blue);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="status">STATUS: SCRIPTER</div>
        <div id="balance">0 $</div>
    </div>

    <div id="hack-tab" class="tab-content active">
        <div class="cyber-card" id="clicker">
            <h2 id="clickText" style="color: var(--neon-blue);">HACK</h2>
        </div>
        
        <button id="adBtn" onclick="watchAd()" style="margin-top: 20px; padding: 15px 30px; background: none; border: 2px solid var(--neon-pink); color: var(--neon-pink); border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 10px var(--neon-pink);">
            📺 Boost X2 (30 сек)
        </button>
        
        <p id="timerText" style="margin-top: 10px; color: var(--neon-pink); display: none;">BOOST ACTIVE: <span id="seconds">30</span>s</p>
    </div>

    <div id="trade-tab" class="tab-content">
        <div class="price-display" id="priceBox">
            NEO COIN: <span id="currentPrice">100</span>$
        </div>
        <div id="cryptoOwned" style="margin-bottom: 20px;">В наличии: 0 NEO</div>
        <div class="trade-controls">
            <button class="btn buy" onclick="buyCrypto()">КУПИТЬ</button>
            <button class="btn sell" onclick="sellCrypto()">ПРОДАТЬ</button>
        </div>
    </div>

   <div id="friends-tab" class="tab-content">
        <h2 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">RECRUITS</h2>
        <p style="text-align: center; opacity: 0.8;">Приглашай хакеров и получай <br><span style="color: var(--neon-pink);">+5000 $</span> за каждого!</p>
        
        <div style="background: var(--card-bg); padding: 20px; border: 1px solid var(--neon-blue); border-radius: 15px; width: 85%; text-align: center; margin-top: 20px;">
            <p style="font-size: 12px; color: var(--neon-blue);">ТВОЯ ССЫЛКА:</p>
            <code id="refLink" style="word-break: break-all; font-size: 10px; color: var(--neon-pink);">t.me/твой_бот?start=user123</code>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" onclick="copyLink()" style="background: #333; font-size: 12px;">КОПИРОВАТЬ</button>
                <button class="btn buy" onclick="shareGame()" style="font-size: 12px;">ПРИГЛАСИТЬ</button>
            </div>
        </div>

        <div style="margin-top: 30px; width: 100%;">
            <p style="font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px;">Список друзей (0)</p>
            <p style="opacity: 0.3; font-size: 12px; text-align: center; margin-top: 10px;">Пока пусто... Время вербовать!</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showTab('hack-tab', this)">HACK</div>
        <div class="nav-item" onclick="showTab('trade-tab', this)">TRADE</div>
        <div class="nav-item" onclick="showTab('friends-tab', this)">FRIENDS</div>
    </div>

    <script>
        // Загрузка данных
        let balance = parseInt(localStorage.getItem('cb_money')) || 0;
        let crypto = parseInt(localStorage.getItem('cb_neo')) || 0;
        let price = 100;

        const balanceEl = document.getElementById('balance');
        const cryptoEl = document.getElementById('cryptoOwned');
        const priceEl = document.getElementById('currentPrice');

        function updateUI() {
            balanceEl.innerText = balance + ' $';
            cryptoEl.innerText = 'В наличии: ' + crypto + ' NEO';
            localStorage.setItem('cb_money', balance);
            localStorage.setItem('cb_neo', crypto);
            
            let st = "SCRIPTER";
            if (balance > 500) st = "NETRUNNER";
            if (balance > 5000) st = "CYBER LORD";
            document.getElementById('status').innerText = "STATUS: " + st;
        }

        // КЛИК
        document.getElementById('clicker').addEventListener('click', function(e) {
            balance += 1;
            updateUI();
            
            // Всплывающая цифра
            const p = document.createElement('div');
            p.className = 'plus-one';
            p.innerText = '+1';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        });

        // БИРЖА
        function buyCrypto() {
            if (balance >= price) {
                balance -= price;
                crypto += 1;
                updateUI();
            }
        }

        function sellCrypto() {
            if (crypto > 0) {
                balance += price;
                crypto -= 1;
                updateUI();
            }
        }

        // ПЕРЕКЛЮЧЕНИЕ ТАБОВ
        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-nav');
        }

     // Улучшенная симуляция рынка (Пампы и Дампы)
        setInterval(() => {
            let volatility;
            
            // Шанс 10% на резкий скачок вверх (ПАМП)
            if (Math.random() > 0.9) {
                volatility = Math.floor(Math.random() * 50) + 20; 
            } 
            // Шанс 10% на резкий обвал (ДАМП)
            else if (Math.random() < 0.1) {
                volatility = -Math.floor(Math.random() * 40) - 10;
            } 
            // В остальное время — обычные колебания
            else {
                volatility = Math.floor((Math.random() - 0.5) * 10);
            }

            price = Math.max(5, price + volatility); // Цена не упадет ниже 5$
            
            // Если цена стала слишком высокой, она начнет «тяжелеть» (коррекция)
            if (price > 500) price -= 5;

            priceEl.innerText = price;
            priceEl.parentElement.style.borderColor = volatility >= 0 ? '#00ff88' : '#ff0055';
            
            // Обновляем доступность кнопок
            document.querySelector('.buy').disabled = balance < price;
            document.querySelector('.sell').disabled = crypto <= 0;
        }, 2000);
let isBoosted = false;
        let boostTimer = null;

        // КЛИК (теперь с проверкой X2)
        document.getElementById('clicker').addEventListener('click', function(e) {
            let gain = isBoosted ? 2 : 1; // Если буст активен, даем +2
            balance += gain;
            updateUI();
            
            const p = document.createElement('div');
            p.className = 'plus-one';
            p.innerText = '+' + gain;
            if(isBoosted) p.style.color = 'var(--neon-pink)'; // Розовый цвет при X2
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        });

        // СИМУЛЯЦИЯ ПРОСМОТРА РЕКЛАМЫ
        function watchAd() {
            const btn = document.getElementById('adBtn');
            const timerText = document.getElementById('timerText');
            const secondsEl = document.getElementById('seconds');
            const clickText = document.getElementById('clickText');

            // Блокируем кнопку на время работы буста
            btn.style.display = 'none';
            timerText.style.display = 'block';
            
            isBoosted = true;
            clickText.innerText = "X2 MODE";
            clickText.style.color = 'var(--neon-pink)';
            document.getElementById('clicker').style.borderColor = 'var(--neon-pink)';

            let timeLeft = 30;
            
            if (boostTimer) clearInterval(boostTimer);
            
            boostTimer = setInterval(() => {
                timeLeft--;
                secondsEl.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(boostTimer);
                    isBoosted = false;
                    btn.style.display = 'block';
                    timerText.style.display = 'none';
                    clickText.innerText = "HACK";
                    clickText.style.color = 'var(--neon-blue)';
                    document.getElementById('clicker').style.borderColor = 'var(--neon-blue)';
                }
            }, 1000);

            // Здесь в будущем будет вызов реальной рекламы:
            // Adsgram.show().then(() => { /* код выше */ })
            alert("Реклама просмотрена! Буст X2 активирован на 30 секунд.");
        }

// Логика реферальной программы
        function generateRefLink() {
            // В реальности здесь должен быть ID пользователя из Telegram
            const userId = Math.floor(Math.random() * 900000) + 100000; 
            const botLink = "https://t.me/CyberBank/game?startapp=" + userId;
            document.getElementById('refLink').innerText = botLink;
            return botLink;
        }

        function copyLink() {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Ссылка скопирована! Отправь её другу.");
        }

        function shareGame() {
            const link = document.getElementById('refLink').innerText;
            const text = "Эй! Заходи в Cyber Punk Exchange, фарми кредиты и стань крипто-лордом! 🚀";
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`;
            window.open(shareUrl, '_blank');
        }

        // Вызываем генерацию ссылки при загрузке
        generateRefLink();

        // 1. Автоматический приветственный бонус для новых игроков
        if (!localStorage.getItem('first_time_bonus')) {
            balance += 1000;
            localStorage.setItem('first_time_bonus', 'true');
            alert("СИСТЕМА ВЗЛОМАНА: Тебе начислено 1000$ стартового капитала!");
        }

        // 2. Исправленная реферальная ссылка (под твоего бота)
        function generateRefLink() {
            // Замени 'CyberBank_bot' на реальный юзернейм твоего бота без @
            const botUsername = "ТВОЙ_ЮЗЕРНЕЙМ_БОТА"; 
            const userId = Math.floor(Math.random() * 900000) + 100000; 
            const botLink = "https://t.me/" + botUsername + "/game?startapp=" + userId;
            document.getElementById('refLink').innerText = botLink;
            return botLink;
        }
        
        // Старт
        updateUI();
    </script>
</body>
</html>
